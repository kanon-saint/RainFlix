<header
  class="sticky top-0 z-20 grid w-full grid-cols-[auto_minmax(0,36rem)] items-center justify-between gap-4 border-b border-blue-950/70 bg-slate-950/85 px-4 py-4 shadow-2xl shadow-black/20 backdrop-blur-xl md:gap-8 md:px-10 lg:px-12"
>
  <a
    class="inline-flex min-w-max items-center text-slate-50 no-underline"
    href="#home"
    aria-label="RainFlix home"
  >
    <span class="text-lg font-black md:text-xl">RainFlix</span>
  </a>

  <div class="relative flex justify-end">
    <label
      class="flex h-10 w-full items-center gap-3 rounded-lg border border-blue-900/70 bg-blue-950/30 px-3 text-slate-400 transition focus-within:border-sky-400 focus-within:ring-4 focus-within:ring-sky-400/10 md:h-11 md:px-4"
      for="globalSearch"
    >
      <svg
        class="h-4 w-4 shrink-0"
        viewBox="0 0 24 24"
        fill="none"
        aria-hidden="true"
      >
        <path
          d="m21 21-4.2-4.2m2.2-5.3a7.5 7.5 0 1 1-15 0 7.5 7.5 0 0 1 15 0Z"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
        />
      </svg>
      <input
        id="globalSearch"
        class="w-full min-w-0 bg-transparent text-sm text-slate-100 outline-none placeholder:text-slate-500"
        type="search"
        placeholder="Search titles"
        autocomplete="off"
      />
    </label>

    <div
      id="searchDropdown"
      class="absolute right-0 top-[calc(100%+0.5rem)] hidden w-full overflow-hidden rounded-lg border border-blue-900/80 bg-slate-950/95 shadow-2xl shadow-black/45 backdrop-blur-xl"
      role="listbox"
      aria-label="Search results"
    ></div>
  </div>
</header>
