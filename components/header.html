<header
  class="sticky top-0 z-20 grid w-full grid-cols-[auto_1fr_auto] items-center gap-5 border-b border-blue-950/70 bg-slate-950/85 px-5 py-4 shadow-2xl shadow-black/20 backdrop-blur-xl md:px-10 lg:px-12 max-md:grid-cols-[auto_1fr]"
>
  <a
    class="inline-flex min-w-max items-center gap-3 text-slate-50 no-underline"
    href="#home"
    aria-label="RainFlix home"
  >
    <span
      class="grid h-9 w-9 place-items-center rounded-lg bg-sky-400 font-black text-slate-950 shadow-lg shadow-sky-500/20"
      >R</span
    >
    <span class="text-lg font-bold">RainFlix</span>
  </a>

  <nav
    class="inline-flex items-center justify-center gap-1 max-md:justify-end"
    aria-label="Primary navigation"
  >
    <a
      class="nav-link min-w-20 rounded-lg px-3 py-2 text-center text-sm font-medium text-slate-400 transition hover:bg-blue-400/10 hover:text-sky-200 focus-visible:bg-blue-400/10 focus-visible:text-sky-200 focus-visible:outline-none max-sm:min-w-0 max-sm:px-2"
      href="#home"
      data-route-link="home"
      >Home</a
    >
    <a
      class="nav-link min-w-20 rounded-lg px-3 py-2 text-center text-sm font-medium text-slate-400 transition hover:bg-blue-400/10 hover:text-sky-200 focus-visible:bg-blue-400/10 focus-visible:text-sky-200 focus-visible:outline-none max-sm:min-w-0 max-sm:px-2"
      href="#movies"
      data-route-link="movies"
      >Movies</a
    >
    <a
      class="nav-link min-w-20 rounded-lg px-3 py-2 text-center text-sm font-medium text-slate-400 transition hover:bg-blue-400/10 hover:text-sky-200 focus-visible:bg-blue-400/10 focus-visible:text-sky-200 focus-visible:outline-none max-sm:min-w-0 max-sm:px-2"
      href="#series"
      data-route-link="series"
      >Series</a
    >
  </nav>

  <div class="relative flex justify-end max-md:col-span-full">
    <label
      class="flex h-11 min-w-64 items-center gap-3 rounded-lg border border-blue-900/70 bg-blue-950/30 px-4 text-slate-400 transition focus-within:border-sky-400 focus-within:ring-4 focus-within:ring-sky-400/10 max-md:w-full max-sm:min-w-0"
      for="globalSearch"
    >
      <svg
        class="h-4 w-4 shrink-0"
        viewBox="0 0 24 24"
        fill="none"
        aria-hidden="true"
      >
        <path
          d="m21 21-4.2-4.2m2.2-5.3a7.5 7.5 0 1 1-15 0 7.5 7.5 0 0 1 15 0Z"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
        />
      </svg>
      <input
        id="globalSearch"
        class="w-full min-w-0 bg-transparent text-sm text-slate-100 outline-none placeholder:text-slate-500"
        type="search"
        placeholder="Search titles"
        autocomplete="off"
      />
    </label>

    <div
      id="searchDropdown"
      class="absolute right-0 top-[calc(100%+0.5rem)] hidden w-[28rem] overflow-hidden rounded-lg border border-blue-900/80 bg-slate-950/95 shadow-2xl shadow-black/45 backdrop-blur-xl max-md:left-0 max-md:right-auto max-md:w-full"
      role="listbox"
      aria-label="Search results"
    ></div>
  </div>
</header>
