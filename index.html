<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="RainFlix is a minimal streaming catalog for movies and series."
    />
    <title>RainFlix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              rain: {
                ink: "#030712",
                panel: "#08111f",
                line: "#1f3a5f",
                blue: "#38bdf8",
                glow: "#60a5fa",
              },
            },
          },
        },
      };
    </script>
    <script defer src="./scripts/config.js"></script>
    <script defer src="./scripts/rainflix-api.js"></script>
    <script defer src="./scripts/app.js"></script>
  </head>

  <body class="min-h-screen bg-rain-ink text-slate-100 antialiased">
    <div
      id="app"
      class="flex min-h-screen flex-col bg-[radial-gradient(circle_at_top_left,rgba(56,189,248,0.16),transparent_34rem),linear-gradient(180deg,#030712_0%,#06101f_52%,#030712_100%)]"
    >
      <div id="site-header" data-component="header"></div>
      <main id="app-view" class="flex-1 outline-none" tabindex="-1"></main>
      <div id="site-footer" data-component="footer"></div>
    </div>
  </body>
</html>
