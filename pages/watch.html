<section
  class="mx-auto w-full max-w-[1440px] px-4 py-5 md:px-10 md:py-8 lg:px-12"
  aria-label="Watch title"
>
  <div
    id="watchLoading"
    class="rounded-xl border border-blue-900/70 bg-blue-950/20 p-4 md:p-8"
  ></div>

  <div id="watchContent" class="hidden">
    <section
      id="watchHero"
      class="hidden overflow-hidden rounded-xl border border-blue-900/70 bg-blue-950/20 shadow-2xl shadow-black/40 md:block"
    ></section>

    <section class="mt-0 grid grid-cols-1 gap-5 md:mt-8 md:grid-cols-[minmax(0,1fr)_360px] md:gap-6">
      <div class="min-w-0">
        <section
          id="playerShell"
          class="overflow-hidden rounded-xl border border-blue-900/70 bg-slate-950 shadow-2xl shadow-black/35"
          aria-label="Streaming player"
        ></section>

        <section
          id="episodeSection"
          class="mt-6 hidden md:mt-8"
          aria-labelledby="episodesTitle"
        ></section>
      </div>

      <aside
        id="detailsPanel"
        class="h-fit rounded-xl border border-blue-900/70 bg-blue-950/20 p-4 md:p-5"
      ></aside>
    </section>
  </div>
</section>
