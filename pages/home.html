<section
  class="mx-auto w-full max-w-[1440px] px-6 py-8 md:px-10 lg:px-12"
  aria-label="RainFlix home"
>
  <section
    id="trendingCarousel"
    class="h-[24rem] overflow-hidden rounded-xl border border-blue-900/70 bg-blue-950/20 shadow-2xl shadow-black/40 md:h-[28rem]"
    aria-label="Trending movie carousel"
  ></section>

  <section class="mt-10" aria-labelledby="trendingTitle">
    <div class="mb-5 flex items-end justify-between gap-6">
      <div>
        <h1 id="trendingTitle" class="text-3xl font-black text-slate-50">
          Trending this week
        </h1>
        <p id="feedMeta" class="mt-2 text-sm text-slate-400">
          Loading TMDb weekly trends.
        </p>
      </div>
    </div>
    <div
      id="trendingGrid"
      class="grid auto-cols-[9.5rem] grid-flow-col gap-3 overflow-x-auto pb-2 md:grid-flow-row md:grid-cols-5 md:gap-4 md:overflow-visible md:pb-0"
      aria-live="polite"
    ></div>
  </section>

  <section class="mt-12" aria-labelledby="newestMoviesTitle">
    <div class="mb-5">
      <h2 id="newestMoviesTitle" class="text-3xl font-black text-slate-50">
        Newest movies
      </h2>
    </div>
    <div
      id="newestMoviesGrid"
      class="grid auto-cols-[9.5rem] grid-flow-col gap-3 overflow-x-auto pb-2 md:grid-flow-row md:grid-cols-5 md:gap-4 md:overflow-visible md:pb-0"
      aria-live="polite"
    ></div>
  </section>

  <section class="mt-12" aria-labelledby="newestSeriesTitle">
    <div class="mb-5">
      <h2 id="newestSeriesTitle" class="text-3xl font-black text-slate-50">
        Newest series
      </h2>
    </div>
    <div
      id="newestSeriesGrid"
      class="grid auto-cols-[9.5rem] grid-flow-col gap-3 overflow-x-auto pb-2 md:grid-flow-row md:grid-cols-5 md:gap-4 md:overflow-visible md:pb-0"
      aria-live="polite"
    ></div>
  </section>
</section>
